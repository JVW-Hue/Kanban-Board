<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board — Simple Task Management</title>
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">
            <img src="icon-512.png" alt="Kanban" class="nav-logo">
            <span class="nav-title">Kanban Board</span>
        </div>

        <div class="board-switcher">
            <button class="board-current" id="boardCurrent" onclick="toggleBoardMenu()">
                <span class="board-current-name" id="boardCurrentName">My Board</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            <div class="board-menu" id="boardMenu">
                <div class="board-menu-header">Your Boards</div>
                <div class="board-menu-list" id="boardMenuList"></div>
                <div class="board-menu-divider"></div>
                <button class="board-menu-item board-menu-new" onclick="createBoard()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    New Board
                </button>
            </div>
        </div>

        <div class="nav-stats">
            <span class="stat" id="statTodo">0 tasks</span>
            <span class="stat-divider"></span>
            <span class="stat" id="statProgress">0 in progress</span>
            <span class="stat-divider"></span>
            <span class="stat" id="statDone">0 done</span>
        </div>
    </nav>

    <main class="board">
        <div class="column" data-status="todo">
            <div class="column-header header-todo">
                <div class="column-title-group">
                    <span class="column-dot dot-todo"></span>
                    <h2>To Do</h2>
                </div>
                <span class="task-count count-todo">0</span>
            </div>
            <div class="task-list" id="todo"></div>
            <button class="add-task-btn" onclick="openModal('todo')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Task
            </button>
        </div>

        <div class="column" data-status="inprogress">
            <div class="column-header header-progress">
                <div class="column-title-group">
                    <span class="column-dot dot-progress"></span>
                    <h2>In Progress</h2>
                </div>
                <span class="task-count count-progress">0</span>
            </div>
            <div class="task-list" id="inprogress"></div>
            <button class="add-task-btn" onclick="openModal('inprogress')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Task
            </button>
        </div>

        <div class="column" data-status="done">
            <div class="column-header header-done">
                <div class="column-title-group">
                    <span class="column-dot dot-done"></span>
                    <h2>Done</h2>
                </div>
                <span class="task-count count-done">0</span>
            </div>
            <div class="task-list" id="done"></div>
            <button class="add-task-btn" onclick="openModal('done')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Task
            </button>
        </div>
    </main>

    <!-- Task Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Task</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <label class="input-label" for="taskInput">Title</label>
                <input type="text" id="taskInput" placeholder="What needs to be done?" autofocus>
                <label class="input-label" for="taskDescription">Description <span class="optional">(optional)</span></label>
                <textarea id="taskDescription" placeholder="Add more details..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTask()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span id="saveBtnText">Add Task</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Board Name Modal -->
    <div class="modal-overlay" id="boardModalOverlay">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 id="boardModalTitle">New Board</h3>
                <button class="modal-close" onclick="closeBoardModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <label class="input-label" for="boardNameInput">Board Name</label>
                <input type="text" id="boardNameInput" placeholder="e.g. Work, Personal, Side Project">
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeBoardModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveBoardName()">
                    <span id="boardSaveBtnText">Create Board</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
