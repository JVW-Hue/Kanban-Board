<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board — Simple Task Management</title>
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">
            <img src="icon-512.png" alt="Kanban" class="nav-logo">
            <span class="nav-title">Kanban Board</span>
        </div>
        <div class="nav-stats">
            <span class="stat" id="statTodo">0 tasks</span>
            <span class="stat-divider"></span>
            <span class="stat" id="statProgress">0 in progress</span>
            <span class="stat-divider"></span>
            <span class="stat" id="statDone">0 done</span>
        </div>
    </nav>

    <main class="board">
        <div class="column" data-status="todo">
            <div class="column-header header-todo">
                <div class="column-title-group">
                    <span class="column-dot dot-todo"></span>
                    <h2>To Do</h2>
                </div>
                <span class="task-count count-todo">0</span>
            </div>
            <div class="task-list" id="todo">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="9" y1="9" x2="15" y2="9"/>
                        <line x1="9" y1="13" x2="15" y2="13"/>
                        <line x1="9" y1="17" x2="12" y2="17"/>
                    </svg>
                    <p>No tasks yet</p>
                    <span>Click "Add Task" to get started</span>
                </div>
            </div>
            <button class="add-task-btn" onclick="openModal('todo')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Task
            </button>
        </div>

        <div class="column" data-status="inprogress">
            <div class="column-header header-progress">
                <div class="column-title-group">
                    <span class="column-dot dot-progress"></span>
                    <h2>In Progress</h2>
                </div>
                <span class="task-count count-progress">0</span>
            </div>
            <div class="task-list" id="inprogress">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <p>Nothing in progress</p>
                    <span>Drag tasks here to start working</span>
                </div>
            </div>
            <button class="add-task-btn" onclick="openModal('inprogress')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Task
            </button>
        </div>

        <div class="column" data-status="done">
            <div class="column-header header-done">
                <div class="column-title-group">
                    <span class="column-dot dot-done"></span>
                    <h2>Done</h2>
                </div>
                <span class="task-count count-done">0</span>
            </div>
            <div class="task-list" id="done">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    <p>No completed tasks</p>
                    <span>Finish tasks to see them here</span>
                </div>
            </div>
            <button class="add-task-btn" onclick="openModal('done')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Task
            </button>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Task</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <label class="input-label" for="taskInput">Title</label>
                <input type="text" id="taskInput" placeholder="What needs to be done?" autofocus>
                <label class="input-label" for="taskDescription">Description <span class="optional">(optional)</span></label>
                <textarea id="taskDescription" placeholder="Add more details..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTask()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span id="saveBtnText">Add Task</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
